<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PsychMind</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0F1E; font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    #app {
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px; min-height: 100vh;
    }

    .header { text-align: center; margin-bottom: 28px; width: 100%; max-width: 720px; }
    .logo {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 36px; font-weight: 600; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #7C9EFF, #A78BFA, #34D399);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite; display: inline-block;
    }
    .tagline { color: #475569; font-size: 13px; margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }

    .card {
      width: 100%; max-width: 720px;
      background: #0F172A; border-radius: 24px;
      border: 1px solid rgba(124,158,255,0.15);
      box-shadow: 0 0 60px rgba(124,158,255,0.08), 0 20px 40px rgba(0,0,0,0.5);
      overflow: hidden; display: flex; flex-direction: column;
      height: calc(100vh - 160px); min-height: 500px;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .tabs {
      display: flex; border-bottom: 1px solid #1E293B;
      background: #0A0F1E; overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1; min-width: 100px; padding: 14px 8px;
      border: none; background: transparent; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      position: relative; transition: all 0.2s;
    }
    .tab-icon { font-size: 18px; }
    .tab-label { font-size: 11px; color: #475569; font-weight: 400; white-space: nowrap; transition: color 0.2s; font-family: 'DM Sans', sans-serif; }
    .tab.active .tab-label { font-weight: 500; }
    .tab-indicator {
      position: absolute; bottom: 0; left: 20%; right: 20%;
      height: 2px; border-radius: 2px 2px 0 0;
      display: none;
    }
    .tab.active .tab-indicator { display: block; }

    .chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .empty-state { text-align: center; margin-top: 32px; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-family: 'Crimson Pro', Georgia, serif; font-size: 22px; color: #94A3B8; margin-bottom: 6px; }
    .empty-sub { color: #475569; font-size: 13px; margin-bottom: 28px; }
    .starters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .starter-btn {
      border-radius: 20px; padding: 8px 14px; font-size: 12px;
      cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
      border: 1px solid; background: transparent;
    }

    .message { display: flex; margin-bottom: 16px; animation: fadeSlideIn 0.3s ease-out; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; margin-right: 10px; flex-shrink: 0; margin-top: 2px;
    }
    .bubble {
      max-width: 75%; border-radius: 18px;
      padding: 12px 16px; font-size: 14px; line-height: 1.6;
      white-space: pre-wrap;
    }
    .bubble.user { border-radius: 18px 18px 4px 18px; color: #fff; }
    .bubble.assistant { border-radius: 18px 18px 18px 4px; background: #1E1E2E; color: #E2E8F0; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }

    .typing { display: flex; align-items: center; gap: 6px; padding: 12px 16px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; opacity: 0.8;
    }
    .dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
    .dot:nth-child(2) { animation: bounce 1.2s ease-in-out 0.2s infinite; }
    .dot:nth-child(3) { animation: bounce 1.2s ease-in-out 0.4s infinite; }

    .input-area { padding: 16px 24px 24px; border-top: 1px solid #1E293B; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    textarea {
      flex: 1; background: #1E1E2E; border: 1px solid #2D3748;
      border-radius: 12px; padding: 12px 16px; color: #E2E8F0;
      font-size: 14px; resize: none; outline: none; font-family: 'DM Sans', sans-serif;
      line-height: 1.5; min-height: 44px; max-height: 120px;
      overflow-y: auto; scrollbar-width: none; transition: border-color 0.2s;
    }
    textarea::-webkit-scrollbar { display: none; }
    .send-btn {
      width: 44px; height: 44px; border-radius: 12px;
      border: none; cursor: pointer; font-size: 20px; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0; background: #1E293B;
    }
    .disclaimer { color: #334155; font-size: 11px; margin-top: 8px; text-align: center; }
    .error-msg { color: #F87171; font-size: 13px; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">PsychMind</div>
    <div class="tagline">AI Study Companion for Psychology Students</div>
  </div>
  <div class="card" id="card">
    <div class="tabs" id="tabs"></div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="inputBox" rows="1" placeholder="Ask anything..."></textarea>
        <button class="send-btn" id="sendBtn">↑</button>
      </div>
      <div class="disclaimer">For educational use only · Not a substitute for professional clinical advice</div>
      <div class="error-msg" id="errorMsg" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const TABS = [
  { id: "study",    icon: "🧠", label: "Study & Revision", color: "#7C9EFF",
    system: "You are a psychology tutor for university students. Explain concepts clearly using real-world analogies and end responses with a short quiz question to test understanding.",
    placeholder: "e.g. Explain cognitive dissonance, or Quiz me on attachment theory...",
    starters: ["Explain the id, ego and superego", "Quiz me on cognitive biases", "What is classical conditioning?", "Summarise Maslow's hierarchy"] },
  { id: "essay",   icon: "✍️",  label: "Essay Writing",    color: "#A78BFA",
    system: "You are an academic writing coach for psychology students. Help them structure arguments, suggest relevant theories and studies, and improve academic tone.",
    placeholder: "e.g. Help me structure an essay on nature vs nurture...",
    starters: ["Outline an essay on free will vs determinism", "What studies support social learning theory?", "How do I write a strong introduction?", "Suggest counterarguments for the nurture side"] },
  { id: "clinical",icon: "🏥", label: "Case Studies",      color: "#34D399",
    system: "You are a clinical psychology case study tutor. Present fictional client scenarios and guide students through assessment and therapeutic approaches. Always clarify these are educational simulations.",
    placeholder: "e.g. Give me a case study on anxiety...",
    starters: ["Give me a depression case study", "How would I assess this client?", "What CBT techniques apply to OCD?", "Walk me through schema therapy"] },
  { id: "career",  icon: "🎓", label: "Career Guidance",   color: "#FB923C",
    system: "You are a career advisor for psychology graduates with strong knowledge of UK career routes. Help students explore paths, qualifications, and postgraduate decisions.",
    placeholder: "e.g. How do I become a clinical psychologist in the UK?...",
    starters: ["What can I do with a psychology degree?", "How do I become a clinical psychologist?", "Is a conversion course worth it?", "Counselling vs therapy — what's the difference?"] },
];

let activeTab = TABS[0];
let histories = { study: [], essay: [], clinical: [], career: [] };
let loading = false;

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = TABS.map(t => `
    <button class="tab ${t.id === activeTab.id ? 'active' : ''}" onclick="switchTab('${t.id}')" style="color:${t.id === activeTab.id ? t.color : '#475569'}">
      <span class="tab-icon">${t.icon}</span>
      <span class="tab-label" style="color:${t.id === activeTab.id ? t.color : '#475569'}">${t.label}</span>
      <div class="tab-indicator" style="background:${t.color};box-shadow:0 0 8px ${t.color}"></div>
    </button>
  `).join('');
  document.getElementById('card').style.borderColor = activeTab.color + '25';
  document.getElementById('card').style.boxShadow = `0 0 60px ${activeTab.color}15, 0 20px 40px rgba(0,0,0,0.5)`;
  document.getElementById('inputBox').placeholder = activeTab.placeholder;
  updateSendBtn();
}

function switchTab(id) {
  activeTab = TABS.find(t => t.id === id);
  renderTabs();
  renderChat();
}

function renderChat() {
  const area = document.getElementById('chatArea');
  const msgs = histories[activeTab.id];
  if (msgs.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${activeTab.icon}</div>
        <div class="empty-title">${activeTab.label}</div>
        <div class="empty-sub">Try one of these to get started</div>
        <div class="starters">
          ${activeTab.starters.map(s => `
            <button class="starter-btn" onclick="send('${s.replace(/'/g,"\\'")}'')"
              style="color:${activeTab.color};border-color:${activeTab.color}40"
              onmouseover="this.style.background='${activeTab.color}30'"
              onmouseout="this.style.background='transparent'"
            >${s}</button>
          `).join('')}
        </div>
      </div>`;
    return;
  }
  area.innerHTML = msgs.map(m => {
    if (m.role === 'user') {
      return `<div class="message user">
        <div class="bubble user" style="background:${activeTab.color};box-shadow:0 4px 20px ${activeTab.color}44">${escHtml(m.content)}</div>
      </div>`;
    } else {
      return `<div class="message assistant">
        <div class="avatar" style="background:${activeTab.color}22;border:2px solid ${activeTab.color}44">🧬</div>
        <div class="bubble assistant">${escHtml(m.content)}</div>
      </div>`;
    }
  }).join('');
  if (loading) {
    area.innerHTML += `<div class="message assistant">
      <div class="avatar" style="background:${activeTab.color}22;border:2px solid ${activeTab.color}44">🧬</div>
      <div class="bubble assistant" style="padding:0">
        <div class="typing">
          <span class="dot" style="background:${activeTab.color}"></span>
          <span class="dot" style="background:${activeTab.color}"></span>
          <span class="dot" style="background:${activeTab.color}"></span>
        </div>
      </div>
    </div>`;
  }
  area.scrollTop = area.scrollHeight;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  const val = document.getElementById('inputBox').value.trim();
  btn.style.background = (val && !loading) ? activeTab.color : '#1E293B';
  btn.style.boxShadow = (val && !loading) ? `0 4px 16px ${activeTab.color}50` : 'none';
}

async function send(text) {
  if (!text || loading) return;
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('inputBox').value = '';
  updateSendBtn();

  histories[activeTab.id].push({ role: 'user', content: text });
  loading = true;
  renderChat();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: histories[activeTab.id], system: activeTab.system }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'API error');
    histories[activeTab.id].push({ role: 'assistant', content: data.text });
  } catch(e) {
    histories[activeTab.id].pop();
    const err = document.getElementById('errorMsg');
    err.textContent = 'Something went wrong. Please try again.';
    err.style.display = 'block';
  }
  loading = false;
  renderChat();
}

document.getElementById('sendBtn').addEventListener('click', () => {
  send(document.getElementById('inputBox').value.trim());
});
document.getElementById('inputBox').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(e.target.value.trim()); }
});
document.getElementById('inputBox').addEventListener('input', updateSendBtn);

renderTabs();
renderChat();
</script>
</body>
</html>
